services:
  # ═══════════════════════════════════════════════════════════════════
  # 1️⃣ STREAMLIT — Interface utilisateur
  # ═══════════════════════════════════════════════════════════════════
  streamlit:
    build:
      context: ..
      dockerfile: docker/streamlit/Dockerfile
    container_name: blood_cell_streamlit
    ports:
      - "8501:8501"
    volumes:
      # Code hot-reload
      - ../src/serving:/app/src/serving
      - ../app:/app/app
      - ../src/data:/app/src/data
      # Données et modèles (partagés avec API)
      - ../data:/app/data
      - ../models:/app/models
      - ../mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://api:8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DAGSHUB_USER=${DAGSHUB_USER}
      - DAGSHUB_TOKEN=${DAGSHUB_TOKEN}
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USER=${SUPABASE_USER}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - DEV_MODE=${DEV_MODE:-0}
    depends_on:
      - api
      - mlflow
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════
  # 2️⃣ FASTAPI — Backend ML
  # ═══════════════════════════════════════════════════════════════════
  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: blood_cell_api
    ports:
      - "8000:8000"
    volumes:
      # Code hot-reload
      - ../src:/app/src
      - ../configs:/app/configs
      - ../scripts:/app/scripts
      # Données partagées
      - ../data:/app/data
      - ../models:/app/models
      - ../mlruns:/app/mlruns
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DAGSHUB_USER=${DAGSHUB_USER}
      - DAGSHUB_TOKEN=${DAGSHUB_TOKEN}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USER=${SUPABASE_USER}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
    depends_on:
      - mlflow
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════
  # 3️⃣ MLFLOW — Experiment tracking
  # ═══════════════════════════════════════════════════════════════════
  mlflow:
    build:
      context: ..
      dockerfile: docker/mlflow/Dockerfile
    container_name: blood_cell_mlflow
    command: >-
      mlflow server
      --backend-store-uri sqlite:////mlflow/db/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost,localhost:5001,127.0.0.1,127.0.0.1:5001,mlflow,mlflow:5000,${MAC_TAILSCALE_IP:-127.0.0.1},${MAC_TAILSCALE_IP:-127.0.0.1}:5001
    ports:
      - "5001:5000"
    volumes:
      - mlflow_db:/mlflow/db
      - ../mlruns/artifacts:/mlflow/artifacts
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/db/mlflow.db
      - MLFLOW_ARTIFACTS_DESTINATION=/mlflow/artifacts
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════
  # 4️⃣ PREPROCESSING — Téléchargement et préparation des données (one-shot)
  # Usage : docker compose -f docker/docker-compose.dev.yml run --rm preprocessing
  # ═══════════════════════════════════════════════════════════════════
  preprocessing:
    build:
      context: ..
      dockerfile: docker/preprocessing/Dockerfile
    container_name: blood_cell_preprocessing
    volumes:
      - ../data:/app/data
      - ../.dvc:/app/.dvc
    environment:
      - DAGSHUB_USER=${DAGSHUB_USER}
      - DAGSHUB_TOKEN=${DAGSHUB_TOKEN}
      - DAGSHUB_REPO_OWNER=${DAGSHUB_REPO_OWNER}
      - DAGSHUB_REPO=${DAGSHUB_REPO}
    profiles:
      - tools
    networks:
      - ml_network

  # ═══════════════════════════════════════════════════════════════════
  # 5️⃣ TRAINING — Entraînement DenseNet-121 one-shot avec MLflow
  # Usage : docker compose -f docker/docker-compose.dev.yml run --rm training
  # Override : docker compose run -e EPOCHS_HEAD=3 -e EPOCHS_FULL=5 training
  # ═══════════════════════════════════════════════════════════════════
  training:
    build:
      context: ..
      dockerfile: docker/training/Dockerfile
    container_name: blood_cell_training
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../mlruns:/app/mlruns
      - ../logs:/app/logs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DAGSHUB_USER=${DAGSHUB_USER}
      - DAGSHUB_TOKEN=${DAGSHUB_TOKEN}
      - DATA_DIR=data/raw
      - OUTPUT_DIR=models
      - EPOCHS_HEAD=5
      - EPOCHS_FULL=10
      - BATCH_SIZE=32
      - RUN_TYPE=base
      - PART=0
    depends_on:
      - mlflow
    profiles:
      - tools
    networks:
      - ml_network

networks:
  ml_network:
    driver: bridge

volumes:
  mlflow_db:
