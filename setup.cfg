[tool:pytest]
testpaths = tests/1_unit tests/2_integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: tests unitaires purs — rapides, sans dépendance externe
    integration: tests d'intégration — API mockée, dépendances isolées
    slow: tests lents nécessitant le modèle .pth — skippés en CI

[flake8]
max-line-length = 120
exclude =
    __pycache__,
    .venv,
    drafts,
    independent_scripts,
    src/evaluation,
    src/serving/batch_inference.py,
    src/train/dl_crossval_train.py
# E203 : whitespace before ':' — style black/ML standard (dict alignment)
# E221 : multiple spaces before operator — alignment lisible en ML
# E272 : multiple spaces before keyword — idem
# W291/W293 : trailing whitespace — géré par l'éditeur
# W292 : no newline at end of file — géré par l'éditeur
extend-ignore = E203, E221, E272, W291, W293, W292, W391
