name: CI — Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Tests unitaires (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install -r requirements/dev.txt

      - name: Lint (flake8)
        run: |
          flake8 src/ --max-line-length=120 --exclude=__pycache__,drafts,independent_scripts

      - name: Tests unitaires (pytest -m unit)
        run: |
          pytest tests/1_unit/ -v --tb=short -m unit

  integration-tests:
    name: Tests d'intégration FastAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install -r requirements/api.txt
          pip install -r requirements/dev.txt

      - name: Tests d'intégration (pytest -m integration)
        run: |
          pytest tests/2_integration/ -v --tb=short -m integration \
            --cov=src/serving --cov-report=term-missing

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -f docker/api/Dockerfile -t blood-cell-classifier:ci .
